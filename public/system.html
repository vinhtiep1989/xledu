<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống - Xứ Lạng Education</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-dark: #0d1b2a; --primary-green: #2ecc71; --sidebar-width: 270px; --header-height: 90px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f4fbf7; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--bg-dark); height: var(--header-height); display: flex; align-items: center; justify-content: center; }
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); padding: 20px; flex-shrink: 0; }
        .sidebar-nav-item { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 20px; border-radius: 30px; font-size: 0.9rem; margin-bottom: 8px;}
        .sidebar-nav-item.active { color: var(--primary-green); background: rgba(46, 204, 113, 0.15); }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; border: 1px solid #e8f1ec; }
        .table th, .table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
    <header class="header"><h1 style="font-size: 2.2rem; font-weight: 900; background: linear-gradient(to bottom, #fff8d6, #e0aa3e); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">XỨ LẠNG EDUCATION</h1></header>
    <div style="display:flex; flex:1; overflow:hidden;">
        <aside class="sidebar"><nav class="sidebar-nav">
            <a href="index.html" class="sidebar-nav-item"><i class="fa-solid fa-house"></i> Trang chủ</a>
            <a href="classes.html" class="sidebar-nav-item"><i class="fa-solid fa-chalkboard"></i> Quản lý lớp học</a>
            <a href="system.html" class="sidebar-nav-item active"><i class="fa-solid fa-sitemap"></i> Quản lý nội bộ</a>
        </nav></aside>
        <main class="content">
            <h2 style="margin-bottom:20px;">DANH SÁCH TÀI KHOẢN</h2>
            <table class="table">
                <thead><tr><th>Họ tên</th><th>Email</th><th>Vai trò</th><th>Mật khẩu</th><th>Xóa</th></tr></thead>
                <tbody id="ut"></tbody>
            </table>
        </main>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCp0_8BJeBbXv4yJKFL_R0gexMOPrqVHj4", authDomain: "xledu-dea6a.firebaseapp.com", projectId: "xledu-dea6a", storageBucket: "xledu-dea6a.firebasestorage.app", messagingSenderId: "56988683349", appId: "1:56988683349:web:7502807eebf8862ed0d8dc" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        // Ép nạp dữ liệu ngay lập tức mà không kiểm tra quyền
        db.collection("users").onSnapshot(snap => {
            const body = document.getElementById('ut'); body.innerHTML = '';
            snap.forEach(doc => { const d = doc.data();
                body.innerHTML += `<tr><td><b>${d.name}</b></td><td>${d.email}</td><td><b>${d.role}</b></td><td><code>${d.password}</code></td><td><button onclick="if(confirm('Xóa?')) db.collection('users').doc('${doc.id}').delete()">Xóa</button></td></tr>`;
            });
        });
    </script>
</body>
</html>
