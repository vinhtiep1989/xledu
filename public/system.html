<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý hệ thống - Xứ Lạng Education</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg-body: #f4fbf7; --bg-dark: #0d1b2a; --bg-card-white: #ffffff; --text-dark: #2c3e50; --text-light: #e0e0e0; --primary-green: #2ecc71; --accent-gold: #e0aa3e; --accent-gold-plated: #a18c66; --grey-light: #f4f7f6; --border-grey: #e8f1ec; --header-height: 90px; --sidebar-width: 270px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-body); color: var(--text-dark); }
        #page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--accent-gold); font-size: 2.5rem; }
        #page-loader p { font-size: 1rem; color: var(--text-light); margin-top: 15px; font-weight: 500; }

        .header { background-color: var(--bg-dark); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 100%; position: relative; height: var(--header-height); padding: 0 40px;}
        .header-left { display: flex; align-items: center; gap: 15px; z-index: 10;}
        .mobile-menu-btn { display: none; background: transparent; border: none; color: var(--accent-gold); font-size: 1.8rem; cursor: pointer; outline: none; }
        .logo-placeholder { width: 55px; height: 55px; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.3); display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.5); font-size: 0.7rem; text-align: center; cursor: pointer; background-size: cover; background-position: center; flex-shrink: 0; }
        
        .header-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); text-align: center; white-space: nowrap; z-index: 5;}
        .header-title { font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; background: linear-gradient(to bottom, #fff8d6, #e0aa3e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0px 5px 20px rgba(224, 170, 62, 0.5); }
        .header-subtitle { font-size: 1rem; font-style: italic; color: var(--accent-gold-plated); font-weight: 500; }
        
        .header-user { display: flex; align-items: center; justify-content: flex-end; gap: 20px; z-index: 10;}
        .user-info { text-align: right; color: var(--text-light); }
        .user-id { color: var(--accent-gold); font-weight: bold; display: flex; align-items: center; justify-content: flex-end; gap: 8px; font-size: 0.85rem;}
        .live-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--primary-green); animation: pulse-live 1.5s infinite; }
        @keyframes pulse-live { 0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } }
        
        .btn-logout { background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); border-radius: 20px; cursor: pointer; font-weight: bold; transition: all 0.3s; white-space: nowrap; padding: 8px 15px; font-size: 0.85rem;}

        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; z-index: 2; }
        .sidebar-nav-item { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: 500; background: rgba(255, 255, 255, 0.02); transition: all 0.3s; border: 1px solid transparent;}
        .sidebar-nav-item i { width: 20px; text-align: center; font-size: 1.1rem; }
        .sidebar-nav-item:hover { color: #fff; transform: translateX(5px); background: rgba(255, 255, 255, 0.08); }
        .sidebar-nav-item.active { color: var(--primary-green); font-weight: 700; background: linear-gradient(90deg, rgba(46, 204, 113, 0.15), rgba(46, 204, 113, 0.05)); border: 1px solid rgba(46, 204, 113, 0.3); transform: translateX(4px); }
        .admin-badge { margin-left: auto; font-size: 0.65rem; text-transform: uppercase; font-weight: 800; background: rgba(224, 170, 62, 0.15); color: var(--accent-gold); padding: 3px 8px; border-radius: 12px; }

        .panel { background-color: var(--bg-card-white); border-radius: 12px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid var(--border-grey); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-add-account { background: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }

        .system-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .system-table th { text-align: left; padding: 12px; color: #888; border-bottom: 2px solid var(--grey-light); }
        .system-table td { padding: 12px; border-bottom: 1px solid var(--border-grey); vertical-align: middle; }

        .action-btn { border: none; background: var(--grey-light); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; color: var(--text-dark); transition: 0.2s; }
        .btn-del { color: #e74c3c; }

        @media (min-width: 1025px) {
            body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
            .main-wrapper { display: flex; flex: 1; overflow: hidden; }
            .sidebar { width: var(--sidebar-width); background-color: var(--bg-dark); flex-shrink: 0; overflow-y: auto; padding: 30px 15px; }
            .dashboard-content { flex: 1; padding: 30px; overflow-y: auto; }
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 450px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border-grey); border-radius: 6px; outline: none; }
    </style>
</head>
<body>

    <div id="page-loader"><i class="fa-solid fa-spinner fa-spin"></i><p>Đang tải cấu hình...</p></div>

    <header class="header">
        <div class="header-left">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fa-solid fa-bars"></i></button>
            <div class="logo-placeholder" id="logo-container"><span>Logo</span></div>
        </div>
        <div class="header-center">
            <div class="header-title">XỨ LẠNG EDUCATION</div>
            <div class="header-subtitle">Chắp cánh ước mơ</div>
        </div>
        <div class="header-user">
            <div class="user-info">Chào, Admin <div class="user-id"><div class="live-dot"></div><span id="userEmailDisplay">...</span></div></div>
            <button class="btn-logout" id="btnLogout"><i class="fa-solid fa-right-from-bracket"></i> Thoát</button>
        </div>
    </header>

    <div class="main-wrapper">
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-nav-item"><i class="fa-solid fa-house"></i> Trang chủ</a>
                <a href="classes.html" class="sidebar-nav-item"><i class="fa-solid fa-chalkboard"></i> Quản lý lớp học</a>
                <a href="#" class="sidebar-nav-item"><i class="fa-solid fa-user-graduate"></i> Quản lý học sinh</a>
                <a href="#" class="sidebar-nav-item"><i class="fa-solid fa-address-book"></i> Hồ sơ giáo viên</a>
                <a href="#" class="sidebar-nav-item"><i class="fa-solid fa-sitemap"></i> Quản lý nội bộ<span class="admin-badge">Admin</span></a>
                <a href="system.html" class="sidebar-nav-item active"><i class="fa-solid fa-gear"></i> Quản lý hệ thống<span class="admin-badge">Admin</span></a>
            </nav>
        </aside>

        <main class="dashboard-content">
            <div class="panel">
                <div class="panel-header">
                    <h3>Quản trị tài khoản hệ thống</h3>
                    <button class="btn-add-account" onclick="openModal()"><i class="fa-solid fa-user-plus"></i> Thêm tài khoản</button>
                </div>
                <div class="table-responsive">
                    <table class="system-table">
                        <thead>
                            <tr>
                                <th>TT</th>
                                <th>Họ và tên</th>
                                <th>Tài khoản hệ thống</th>
                                <th>Mật khẩu</th>
                                <th>Số điện thoại</th>
                                <th>Phân quyền</th>
                                <th style="text-align: right;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="user-list"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="userModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Tạo tài khoản</h3>
            <form id="userForm">
                <div class="form-group"><label>Họ tên</label><input type="text" id="u_name" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="u_email" required></div>
                <div class="form-group"><label>Mật khẩu</label><input type="text" id="u_pass" required></div>
                <div class="form-group"><label>SĐT</label><input type="tel" id="u_phone"></div>
                <div class="form-group"><label>Quyền</label><select id="u_role"><option value="teacher">Giáo viên</option><option value="admin">Quản trị viên</option></select></div>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn-add-account">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCp0_8BJeBbXv4yJKFL_R0gexMOPrqVHj4", authDomain: "xledu-dea6a.firebaseapp.com", projectId: "xledu-dea6a", storageBucket: "xledu-dea6a.firebasestorage.app", messagingSenderId: "56988683349", appId: "1:56988683349:web:7502807eebf8862ed0d8dc" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentAuthUser = null;

        function normalizeEmail(email) {
            return String(email || '').trim().toLowerCase();
        }

        function translateFirebaseError(error) {
            if (!error || !error.code) return (error && error.message) ? error.message : 'Đã xảy ra lỗi không xác định.';
            if (error.code === 'auth/email-already-in-use') return 'Email này đã tồn tại trong Firebase Auth. Nếu đây là tài khoản cũ, hãy dùng đúng mật khẩu cũ hoặc kiểm tra lại danh sách tài khoản.';
            if (error.code === 'auth/invalid-email') return 'Email không hợp lệ.';
            if (error.code === 'auth/weak-password') return 'Mật khẩu phải có ít nhất 6 ký tự.';
            if (error.code === 'auth/network-request-failed') return 'Lỗi kết nối mạng tới Firebase.';
            return error.message || 'Đã xảy ra lỗi khi xử lý tài khoản.';
        }

        function getSecondaryAuth() {
            let secondaryApp = firebase.apps.find(app => app.name === 'SecondaryAccountCreator');
            if (!secondaryApp) secondaryApp = firebase.initializeApp(firebaseConfig, 'SecondaryAccountCreator');
            return secondaryApp.auth();
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentAuthUser = user;
                document.getElementById('page-loader').style.display = 'none';
                document.getElementById('userEmailDisplay').textContent = user.email;
                loadUsers();
            } else {
                window.location.href = 'login.html';
            }
        });

        function loadUsers() {
            db.collection("users").onSnapshot(snap => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                let index = 1;

                snap.forEach(doc => {
                    const d = doc.data() || {};
                    const status = d.status || d.accountStatus || 'active';
                    const isClosed = status === 'closed';
                    list.innerHTML += `<tr style="${isClosed ? 'opacity:0.5' : ''}">
                        <td>${index++}</td>
                        <td><strong>${d.name || ''}</strong></td>
                        <td>${d.email || ''}</td>
                        <td><span id="p-${doc.id}">********</span> <button class="action-btn" onclick="togglePass('${doc.id}','${(d.password || '').replace(/'/g, "\'")}')"><i class="fa-solid fa-eye"></i></button></td>
                        <td>${d.phone || '---'}</td>
                        <td><span class="admin-badge" style="background:${d.role==='admin'?'':'rgba(46,204,113,0.1)'}; color:${d.role==='admin'?'':'#2ecc71'}">${d.role || 'teacher'}</span></td>
                        <td style="text-align: right;">
                            <button class="action-btn" onclick="toggleStatus('${doc.id}','${status}')"><i class="fa-solid ${isClosed?'fa-unlock':'fa-lock'}"></i></button>
                            <button class="action-btn btn-del" onclick="deleteAcc('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                        </td></tr>`;
                });
            });
        }

        function togglePass(id, p) {
            const el = document.getElementById('p-' + id);
            el.innerText = el.innerText === '********' ? p : '********';
        }

        function openModal() { document.getElementById('userModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('userModal').style.display = 'none'; }

        document.getElementById('userForm').onsubmit = async (e) => {
            e.preventDefault();

            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalLabel = submitBtn.innerHTML;
            const name = document.getElementById('u_name').value.trim();
            const email = normalizeEmail(document.getElementById('u_email').value);
            const password = document.getElementById('u_pass').value.trim();
            const phone = document.getElementById('u_phone').value.trim();
            const role = document.getElementById('u_role').value;

            if (!name || !email || !password) {
                alert('Vui lòng nhập đầy đủ họ tên, email và mật khẩu.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang tạo...';

            const secondaryAuth = getSecondaryAuth();

            try {
                const cred = await secondaryAuth.createUserWithEmailAndPassword(email, password);
                const uid = cred.user.uid;
                const existingSnap = await db.collection('users').where('email', '==', email).get();

                const payload = {
                    uid: uid,
                    name: name,
                    email: email,
                    password: password,
                    phone: phone,
                    role: role,
                    status: 'active',
                    accountStatus: 'active',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (existingSnap.empty) {
                    payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('users').doc(uid).set(payload, { merge: true });
                } else {
                    await existingSnap.docs[0].ref.set(payload, { merge: true });
                }

                await secondaryAuth.signOut();
                closeModal();
                form.reset();
                alert('Đã tạo tài khoản đăng nhập thành công. Tài khoản mới đã được đẩy lên Firebase Auth và Firestore.');
            } catch (error) {
                try { await secondaryAuth.signOut(); } catch (_) {}
                alert('Lỗi tạo tài khoản: ' + translateFirebaseError(error));
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalLabel;
            }
        };

        function deleteAcc(id) {
            if (currentAuthUser && currentAuthUser.uid === id) {
                alert('Không thể xóa chính tài khoản đang đăng nhập.');
                return;
            }
            if (confirm('Xác nhận xóa?')) db.collection('users').doc(id).delete();
        }

        function toggleStatus(id, s) {
            const n = s === 'closed' ? 'active' : 'closed';
            if (confirm('Xác nhận thao tác?')) {
                db.collection('users').doc(id).update({
                    status: n,
                    accountStatus: n,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }

        document.getElementById('btnLogout').onclick = () => auth.signOut();
    </script>
</body>
</html>
