<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Xứ Lạng Education</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg-dark: #0d1b2a; --bg-card-white: #ffffff; --text-dark: #2c3e50; --text-light: #e0e0e0; --primary-green: #2ecc71; --accent-gold: #e0aa3e; --accent-gold-plated: #a18c66; --input-bg: #f8faf9; --border-grey: #e8f1ec; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        /* Thêm padding cho body để trên mobile form không chạm viền */
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; min-height: 100dvh; background-color: var(--bg-dark); overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; padding: 20px; }
        
        .bg-glow { position: absolute; border-radius: 50%; filter: blur(100px); z-index: 0; animation: float 10s infinite ease-in-out alternate; }
        .glow-1 { width: 400px; height: 400px; background: rgba(46, 204, 113, 0.15); top: -100px; left: -100px; }
        .glow-2 { width: 500px; height: 500px; background: rgba(224, 170, 62, 0.1); bottom: -150px; right: -100px; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }
        
        .login-card { background-color: var(--bg-card-white); width: 100%; max-width: 420px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); position: relative; z-index: 10; border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-header { text-align: center; margin-bottom: 35px; }
.brand-title { font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(to bottom, #112031, var(--accent-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; margin-bottom: 5px; }
        .brand-subtitle { font-size: 0.9rem; font-style: italic; color: var(--accent-gold-plated); font-weight: 600; letter-spacing: 1px; }
        
        .login-form { display: flex; flex-direction: column; gap: 20px; }
        .input-group { position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; font-size: 1.1rem; transition: color 0.3s; }
        .input-group input { width: 100%; padding: 15px 15px 15px 45px; border: 2px solid var(--border-grey); border-radius: 12px; background-color: var(--input-bg); font-size: 0.95rem; color: var(--text-dark); outline: none; transition: all 0.3s ease; font-weight: 500; }
        .input-group input::placeholder { color: #aaa; font-weight: 400; }
        .input-group input:focus { border-color: var(--accent-gold); background-color: var(--bg-card-white); box-shadow: 0 0 0 4px rgba(224, 170, 62, 0.1); }
        .input-group input:focus + i, .input-group input:focus ~ i { color: var(--accent-gold); }
        .toggle-password { position: absolute; right: 15px; left: auto !important; cursor: pointer; color: #aaa !important; }
        .toggle-password:hover { color: var(--text-dark) !important; }
        
        .form-options { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: #555; cursor: pointer; }
        .remember-me input[type="checkbox"] { accent-color: var(--accent-gold); width: 16px; height: 16px; cursor: pointer; }
        .forgot-password { color: var(--accent-gold-plated); text-decoration: none; font-weight: 600; transition: color 0.3s; cursor: pointer; }
        .forgot-password:hover { color: var(--accent-gold); text-decoration: underline; }
        
        .btn-login { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent-gold), #c99327); color: var(--bg-card-white); border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 15px rgba(224, 170, 62, 0.3); display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(224, 170, 62, 0.4); background: linear-gradient(135deg, #eec05c, var(--accent-gold)); }
        
        .error-message { color: #e74c3c; font-size: 0.85rem; text-align: center; display: none; font-weight: 600; margin-top: -10px; }
        .fa-spinner { display: none; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .register-link { text-align: center; margin-top: 25px; font-size: 0.85rem; color: #666; }
        .register-link a { color: var(--bg-dark); font-weight: 700; text-decoration: none; cursor: pointer; }
        .register-link a:hover { text-decoration: underline; }

        /* Popup Liên Hệ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 27, 42, 0.8); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.3s ease; padding: 20px;}
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-card-white); width: 100%; max-width: 450px; padding: 30px; border-radius: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.4); transform: translateY(20px); transition: all 0.3s ease; text-align: center; border-top: 5px solid var(--accent-gold); }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-icon { font-size: 3rem; color: var(--accent-gold); margin-bottom: 15px; }
        .modal-title { font-size: 1.3rem; font-weight: 800; color: var(--text-dark); margin-bottom: 20px; text-transform: uppercase; }
        .contact-info { background: var(--input-bg); padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; border: 1px solid var(--border-grey); }
        .contact-info p { margin: 8px 0; font-size: 0.95rem; color: var(--text-dark); font-weight: 500; }
        .contact-info i { color: var(--primary-green); width: 25px; text-align: center; margin-right: 5px; }
        .btn-close-modal { background: var(--bg-dark); color: white; border: none; padding: 10px 30px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-close-modal:hover { background: #1a365d; }

        /* TỐI ƯU GIAO DIỆN MOBILE (Dưới 768px) */
        @media (max-width: 768px) {
            .login-card { padding: 30px 20px; }
            .brand-title { font-size: 1.6rem; }
            .modal-content { padding: 20px; }
            .bg-glow { display: none; } /* Tắt bóng sáng trên mobile cho mượt */
        }
    </style>
</head>
<body>

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="login-card">
        <div class="card-header">
<h1 class="brand-title">XỨ LẠNG<br>EDUCATION</h1>
            <p class="brand-subtitle">Chắp cánh ước mơ</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="error-message" id="errorMessage">
                <i class="fa-solid fa-circle-exclamation"></i> Tài khoản hoặc mật khẩu không đúng!
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Nhập Email đăng nhập" required>
                <i class="fa-solid fa-envelope"></i>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                <i class="fa-solid fa-lock"></i>
                <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
            </div>
            <div class="form-options">
                <label class="remember-me"><input type="checkbox" id="rememberMe"> Nhớ tài khoản</label>
                <a class="forgot-password" id="openForgotModal">Quên mật khẩu?</a>
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText">Đăng nhập ngay</span>
                <i class="fa-solid fa-spinner" id="loadingIcon"></i>
            </button>
        </form>

        <div class="register-link">
            Chưa có tài khoản? <a id="openContactModal">Liên hệ Admin</a>
        </div>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="modal-content">
            <div class="modal-icon"><i class="fa-solid fa-headset"></i></div>
            <h2 class="modal-title">Hỗ trợ tài khoản</h2>
            <div class="contact-info">
                <p><i class="fa-solid fa-user-tie"></i> Admin: <strong>Nguyễn Phượng Ngân</strong></p>
                <p><i class="fa-solid fa-phone-volume"></i> Zalo/Phone: <strong>0931.595.3426</strong></p>
            </div>
            <div class="contact-info">
                <p><i class="fa-solid fa-user-tie"></i> Admin: <strong>Nguyễn Thanh Dũng</strong></p>
                <p><i class="fa-solid fa-phone-volume"></i> Zalo/Phone: <strong>0913.299.386</strong></p>
            </div>
            <button class="btn-close-modal" id="closeContactModal">ĐÓNG</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCp0_8BJeBbXv4yJKFL_R0gexMOPrqVHj4",
            authDomain: "xledu-dea6a.firebaseapp.com",
            projectId: "xledu-dea6a",
            storageBucket: "xledu-dea6a.firebasestorage.app",
            messagingSenderId: "56988683349",
            appId: "1:56988683349:web:7502807eebf8862ed0d8dc",
            measurementId: "G-BWV1GD3WS1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- XỬ LÝ POPUP LIÊN HỆ & QUÊN MẬT KHẨU ---
        const contactBtn = document.getElementById('openContactModal');
        const forgotBtn = document.getElementById('openForgotModal');
        const contactModal = document.getElementById('contactModal');
        const closeContactBtn = document.getElementById('closeContactModal');
        const emailInput = document.getElementById('email');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');
        const errorMessage = document.getElementById('errorMessage');
        let authCheckInProgress = false;

        function normalizeEmail(email) {
            return String(email || '').trim().toLowerCase();
        }

        function showModal(e) {
            e.preventDefault();
            contactModal.classList.add('show');
        }

        function setLoadingState(isLoading) {
            btnText.textContent = isLoading ? 'Đang xác thực...' : 'Đăng nhập ngay';
            loadingIcon.style.display = isLoading ? 'inline-block' : 'none';
            loginBtn.style.opacity = isLoading ? '0.8' : '1';
            loginBtn.disabled = isLoading;
        }

        function showError(message) {
            errorMessage.style.display = 'block';
            errorMessage.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + message;
            setLoadingState(false);
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        async function getUserProfileByEmail(email) {
            const normalizedEmail = normalizeEmail(email);
            if (!normalizedEmail) return null;

            const directDoc = await db.collection('users').doc(normalizedEmail).get().catch(() => null);
            if (directDoc && directDoc.exists) {
                return { id: directDoc.id, ...(directDoc.data() || {}) };
            }

            const snap = await db.collection('users').where('email', '==', normalizedEmail).limit(1).get();
            if (!snap.empty) {
                return { id: snap.docs[0].id, ...(snap.docs[0].data() || {}) };
            }

            return null;
        }

        function isAccountClosed(profile) {
            if (!profile) return false;
            const status = String(profile.status || profile.accountStatus || 'active').toLowerCase();
            return status === 'closed' || status === 'inactive' || status === 'disabled' || status === 'locked';
        }

        async function validateSignedInUser(user) {
            if (!user || authCheckInProgress) return;
            authCheckInProgress = true;

            try {
                const profile = await getUserProfileByEmail(user.email);

                if (!profile) {
                    await auth.signOut();
                    showError('Tài khoản chưa được cấp quyền trên hệ thống. Vui lòng liên hệ Admin.');
                    return;
                }

                if (isAccountClosed(profile)) {
                    await auth.signOut();
                    showError('Tài khoản đang bị khóa. Vui lòng liên hệ Admin để được cấp lại quyền truy cập.');
                    return;
                }

                window.location.href = 'index.html';
            } catch (error) {
                console.error(error);
                try { await auth.signOut(); } catch (_) {}
                showError('Không kiểm tra được trạng thái tài khoản. Vui lòng thử lại sau.');
            } finally {
                authCheckInProgress = false;
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) validateSignedInUser(user);
        });

        contactBtn.addEventListener('click', showModal);
        forgotBtn.addEventListener('click', showModal);
        closeContactBtn.addEventListener('click', () => contactModal.classList.remove('show'));
        contactModal.addEventListener('click', (e) => { if (e.target === contactModal) contactModal.classList.remove('show'); });

        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('xl_saved_email');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberMeCheckbox.checked = true;
            }
        });

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = normalizeEmail(emailInput.value);
            const password = passwordInput.value;

            hideError();
            setLoadingState(true);

            try {
                await auth.setPersistence(rememberMeCheckbox.checked ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
                await auth.signInWithEmailAndPassword(email, password);
                if (rememberMeCheckbox.checked) localStorage.setItem('xl_saved_email', email);
                else localStorage.removeItem('xl_saved_email');
            } catch (error) {
                if (['auth/invalid-login-credentials', 'auth/user-not-found', 'auth/wrong-password', 'auth/invalid-credential'].includes(error.code)) {
                    showError('Tài khoản hoặc mật khẩu không đúng!');
                } else if (error.code === 'auth/too-many-requests') {
                    showError('Bạn đã thử quá nhiều lần. Vui lòng thử lại sau!');
                } else {
                    console.error(error);
                    showError('Lỗi hệ thống, vui lòng thử lại!');
                }
            }
        });
    </script>
</body>
</html>
