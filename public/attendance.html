<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Điểm danh - Xứ Lạng Education</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-dark: #0d1b2a; --primary-green: #2ecc71; --sidebar-width: 270px; --header-height: 90px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f4fbf7; }
        .header { background: var(--bg-dark); height: var(--header-height); display: flex; align-items: center; justify-content: center; }
        .main-wrapper { display: flex; height: calc(100vh - var(--header-height)); }
        .sidebar { width: var(--sidebar-width); background: var(--bg-dark); padding: 20px; flex-shrink: 0; }
        .sidebar-nav-item { display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 20px; border-radius: 30px; margin-bottom: 8px;}
        .sidebar-nav-item.active { color: var(--primary-green); background: rgba(46, 204, 113, 0.15); }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85rem; }
        .table th, .table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .sticky-left { position: sticky; left: 0; background: white; z-index: 11; border-right: 2px solid var(--primary-green) !important; text-align: left !important; min-width: 150px;}
        .btn-save { background: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .toast { position: fixed; top: 20px; right: -400px; background: white; border-left: 5px solid var(--primary-green); padding: 15px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.4s; z-index: 9999; }
        .toast.show { right: 20px; }
    </style>
</head>
<body>
    <div class="toast" id="myToast"><b id="t-t"></b><p id="t-m"></p></div>
    <header class="header"><h1 style="font-size: 2.2rem; font-weight: 900; background: linear-gradient(to bottom, #fff8d6, #e0aa3e); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">XỨ LẠNG EDUCATION</h1></header>
    <div class="main-wrapper">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-nav-item"><i class="fa-solid fa-house"></i> Trang chủ</a>
                <a href="classes.html" class="sidebar-nav-item active"><i class="fa-solid fa-chalkboard"></i> Quản lý lớp học</a>
                <a href="system.html" class="sidebar-nav-item"><i class="fa-solid fa-sitemap"></i> Quản lý nội bộ</a>
            </nav>
        </aside>
        <main class="content">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h2 id="className">Đang tải...</h2><button class="btn-save" onclick="doSave()">Chốt & Lưu</button></div>
            <div style="overflow-x:auto;"><table class="table"><thead id="h"></thead><tbody id="b"></tbody></table></div>
        </main>
    </div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCp0_8BJeBbXv4yJKFL_R0gexMOPrqVHj4", authDomain: "xledu-dea6a.firebaseapp.com", projectId: "xledu-dea6a", storageBucket: "xledu-dea6a.firebasestorage.app", messagingSenderId: "56988683349", appId: "1:56988683349:web:7502807eebf8862ed0d8dc" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const cId = new URLSearchParams(window.location.search).get('id');
        let students = [];
        
        function showToast(t, m) { 
            document.getElementById('t-t').innerText = t; document.getElementById('t-m').innerText = m;
            const toast = document.getElementById('myToast'); toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        db.collection("classes").doc(cId).get().then(doc => {
            document.getElementById('className').innerText = doc.data().className;
            renderH(); loadS();
        });

        function renderH() {
            let d = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
            let html = `<tr><th class="sticky-left">Học sinh</th>`;
            for(let i=1; i<=d; i++) html += `<th>${i}</th>`;
            html += `<th>Tổng</th></tr>`;
            document.getElementById('h').innerHTML = html;
        }

        function loadS() {
            db.collection("classes").doc(cId).collection("students").onSnapshot(snap => {
                const body = document.getElementById('b'); body.innerHTML = ''; students = [];
                snap.forEach(doc => {
                    const s = doc.data(); s.id = doc.id; students.push(s);
                    let row = `<tr><td class="sticky-left"><b>${s.name}</b></td>`;
                    for(let i=1; i<=31; i++) row += `<td><input type="text" style="width:25px; text-align:center; border:none;" value="${(s.attendance||{})[i]||''}" class="i-${s.id}" data-day="${i}"></td>`;
                    row += `<td>0</td></tr>`; body.innerHTML += row;
                });
            });
        }

        function doSave() {
            const batch = db.batch();
            students.forEach(s => {
                let att = {}; document.querySelectorAll(`.i-${s.id}`).forEach(i => { if(i.value) att[i.dataset.day] = i.value; });
                batch.update(db.collection("classes").doc(cId).collection("students").doc(s.id), { attendance: att });
            });
            batch.commit().then(() => showToast("Thành công!", "Dữ liệu đã được lưu."));
        }
    </script>
</body>
</html>
